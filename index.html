<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALLFJ AI · Invoice Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS  (from the ALLFJ AI handoff spec)
     ============================================================ */
  :root {
    --ink: #17150F;          /* primary text            */
    --body: #454136;         /* body / secondary text   */
    --muted: #6E6A5E;        /* micro-labels            */
    --faint: #8A8578;        /* legal footer            */
    --accent: #BC4A1A;       /* burnt orange (2 places) */
    --hair: rgba(23,21,15,0.14);   /* hairline dividers */
    --hair-cols: rgba(23,21,15,0.7);/* above col headers */
    --hair-strong: #17150F;         /* header / total rules */
    --serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    --mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

    /* app chrome (quiet, brand-consistent) */
    --paper: #FFFFFF;
    --bg: #F4F2EC;           /* warm off-white workspace */
    --panel: #FAF9F5;
    --line: rgba(23,21,15,0.12);
    --field: #FFFFFF;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--serif);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--ink); }

  /* ============================================================
     APP LAYOUT
     ============================================================ */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 14px 22px;
    background: var(--panel); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand img { width: 30px; height: 30px; display: block; }
  .brand .wm { display: flex; flex-direction: column; gap: 1px; line-height: 1; }
  .brand .wm b { font-size: 17px; font-weight: 600; letter-spacing: 0.04em; }
  .brand .wm span {
    font-family: var(--mono); font-size: 7.5px; letter-spacing: 0.26em;
    color: var(--muted); text-transform: uppercase;
  }
  .actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  button, .btn {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; cursor: pointer;
    padding: 9px 14px; border: 1px solid var(--hair-strong);
    background: transparent; color: var(--ink); border-radius: 0;
    transition: background .15s, color .15s;
  }
  button:hover, .btn:hover { background: var(--ink); color: #fff; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #a03d14; border-color: #a03d14; }
  button.ghost { border-color: var(--line); color: var(--muted); }
  button.ghost:hover { background: var(--muted); color: #fff; border-color: var(--muted); }
  button.mini { padding: 5px 8px; font-size: 9px; letter-spacing: 0.08em; }

  .work { display: flex; align-items: stretch; flex: 1; min-height: 0; }

  /* ---- FORM PANE (left) ---- */
  .formpane {
    width: 440px; flex: 0 0 440px; background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto; max-height: calc(100vh - 60px);
  }
  .formpane .inner { padding: 22px 24px 60px; }

  .sec { margin-bottom: 26px; }
  .sec > h2 {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 12px;
    font-weight: 500;
  }
  .sec.plain > h2 { color: var(--muted); }
  .row { display: flex; gap: 12px; }
  .row > .field { flex: 1; }
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
  }
  input[type=text], input[type=date], input[type=number], input[type=email],
  input[type=tel], textarea, select {
    width: 100%; font-family: var(--serif); font-size: 14px; color: var(--ink);
    background: var(--field); border: 1px solid var(--line); border-radius: 0;
    padding: 8px 10px; outline: none; transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  input.mono, textarea.mono { font-family: var(--mono); font-size: 13px; }
  textarea { resize: vertical; line-height: 1.5; }
  select { cursor: pointer; }

  /* line item cards */
  .item {
    border: 1px solid var(--line); background: #fff;
    padding: 12px; margin-bottom: 10px;
  }
  .item .item-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .item .item-head .num {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
    color: var(--muted); text-transform: uppercase;
  }
  .item .item-head .item-btns { display: flex; gap: 5px; }
  .item textarea[data-f="subtitle"] { min-height: 118px; }
  .item .qr { display: flex; gap: 10px; }
  .item .qr .field { margin-bottom: 0; }
  .item .qr .amt {
    flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
    align-items: flex-end; padding-bottom: 8px;
  }
  .item .qr .amt .lbl {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
  }
  .item .qr .amt .val { font-family: var(--mono); font-size: 14px; }

  .toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .toggle input { width: 16px; height: 16px; accent-color: var(--accent); }
  .toggle label {
    font-family: var(--serif); font-size: 13.5px; color: var(--body); margin: 0;
    text-transform: none; letter-spacing: 0;
  }

  details.panel { border: 1px solid var(--line); background: #fff; margin-bottom: 14px; }
  details.panel > summary {
    list-style: none; cursor: pointer; padding: 11px 14px;
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted); user-select: none;
    display: flex; justify-content: space-between; align-items: center;
  }
  details.panel > summary::-webkit-details-marker { display: none; }
  details.panel > summary::after { content: '+'; font-size: 13px; }
  details.panel[open] > summary::after { content: '\2212'; }
  details.panel .panel-body { padding: 4px 14px 16px; border-top: 1px solid var(--line); }

  .savedlist { display: flex; flex-direction: column; gap: 6px; }
  .savedlist .srow {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 7px 9px; border: 1px solid var(--line); background: var(--panel);
  }
  .savedlist .srow .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .savedlist .srow .meta b { font-size: 13px; font-weight: 600; }
  .savedlist .srow .meta span { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .savedlist .srow .sbtns { display: flex; gap: 5px; flex: 0 0 auto; }
  .empty-note { font-size: 12.5px; color: var(--muted); font-style: italic; }

  .hint { font-size: 11.5px; color: var(--muted); line-height: 1.5; margin-top: -2px; }

  /* ---- PREVIEW PANE (right) ---- */
  .previewpane {
    flex: 1; min-width: 0; overflow: auto;
    background:
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(23,21,15,0.015) 10px, rgba(23,21,15,0.015) 20px),
      var(--bg);
    padding: 34px 30px 60px;
    display: flex; justify-content: center; align-items: flex-start;
  }
  #stage { transform-origin: top left; margin: 0 auto; }

  /* ============================================================
     THE INVOICE SHEET  (recreates the handoff design exactly)
     ============================================================ */
  #sheet {
    width: 210mm; min-height: 297mm; background: var(--paper);
    padding: 17mm; box-sizing: border-box;
    box-shadow: 0 2px 30px rgba(23,21,15,0.14);
    font-family: var(--serif); color: var(--ink);
    font-size: 14px; line-height: 1.6;
    display: flex; flex-direction: column;
  }
  #sheet .mono { font-family: var(--mono); }
  #sheet .lbl { font-family: var(--mono); color: var(--muted); text-transform: uppercase; }

  /* header */
  #sheet .hdr { display: flex; justify-content: space-between; align-items: flex-start; }
  #sheet .hdr .id { display: flex; align-items: center; gap: 12px; padding-top: 6px; }
  #sheet .hdr .id img { width: 40px; height: 40px; display: block; }
  #sheet .hdr .wm { display: flex; flex-direction: column; gap: 2px; }
  #sheet .hdr .wm .name { font-size: 24px; font-weight: 600; letter-spacing: 0.04em; line-height: 1; }
  #sheet .hdr .wm .tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.28em; color: var(--muted); }
  #sheet .hdr .meta-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }
  #sheet .hdr .doc-title { font-size: 44px; font-weight: 400; letter-spacing: 0.02em; line-height: 1; }
  #sheet .hdr .meta { display: grid; grid-template-columns: auto auto; gap: 4px 20px; text-align: right; }
  #sheet .hdr .meta .k { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em; color: var(--muted); align-self: center; text-align: left; }
  #sheet .hdr .meta .v { font-family: var(--mono); font-size: 12px; }
  #sheet .rule-strong { height: 1px; background: var(--hair-strong); margin: 28px 0 0; }

  /* bill to / from */
  #sheet .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 26px 0 34px; }
  #sheet .parties .col { display: flex; flex-direction: column; gap: 10px; }
  #sheet .parties .plabel { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; }
  #sheet .parties .plabel.to { color: var(--accent); }
  #sheet .parties .plabel.from { color: var(--muted); }
  #sheet .parties .lines { display: flex; flex-direction: column; gap: 2px; }
  #sheet .parties .lines .co { font-size: 16px; font-weight: 600; }
  #sheet .parties .lines .ln { color: var(--body); }

  /* line items */
  #sheet .items-head { display: grid; grid-template-columns: 1fr 70px 110px 110px; gap: 0 18px; align-items: baseline; border-top: 1px solid var(--hair-cols); padding: 12px 0 10px; }
  #sheet .items-head .h { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.22em; color: var(--muted); }
  #sheet .items-head .h.r { text-align: right; }
  #sheet .item-row { display: grid; grid-template-columns: 1fr 70px 110px 110px; gap: 0 18px; align-items: baseline; border-top: 1px solid var(--hair); padding: 16px 0; }
  #sheet .item-row .desc { display: flex; flex-direction: column; gap: 3px; }
  #sheet .item-row .desc .t { font-weight: 600; }
  #sheet .item-row .desc .s {
    font-size: 12.5px; color: var(--muted); white-space: pre-line;
    line-height: 1.55;
  }
  #sheet .item-row .fig { font-family: var(--mono); font-size: 12.5px; text-align: right; }

  /* totals */
  #sheet .totals { display: flex; justify-content: flex-end; border-top: 1px solid var(--hair); }
  #sheet .totals .box { width: 320px; display: flex; flex-direction: column; padding-top: 14px; }
  #sheet .totals .trow { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; }
  #sheet .totals .trow .k { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.22em; color: var(--muted); }
  #sheet .totals .trow .v { font-family: var(--mono); font-size: 12.5px; }
  #sheet .totals .trow .v.muted { color: var(--muted); }
  #sheet .totals .grand { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid var(--hair-strong); margin-top: 12px; padding-top: 12px; }
  #sheet .totals .grand .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: var(--accent); }
  #sheet .totals .grand .v { font-size: 26px; font-weight: 600; }

  /* payment + notes */
  #sheet .paynotes { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 44px; border-top: 1px solid var(--hair); padding-top: 24px; }
  #sheet .paynotes .col { display: flex; flex-direction: column; gap: 12px; }
  #sheet .paynotes .blabel { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; color: var(--muted); }
  #sheet .paynotes .pgrid { display: grid; grid-template-columns: 110px 1fr; gap: 6px 16px; }
  #sheet .paynotes .pgrid .pk { color: var(--muted); font-size: 13px; }
  #sheet .paynotes .pgrid .pv { font-family: var(--mono); font-size: 12.5px; }
  #sheet .paynotes .notes { font-size: 13px; color: var(--body); line-height: 1.7; }

  /* footer */
  #sheet .foot { margin-top: auto; padding-top: 48px; }
  #sheet .foot .inner { border-top: 1px solid var(--hair); padding-top: 14px; display: flex; justify-content: space-between; align-items: baseline; gap: 24px; flex-wrap: wrap; }
  #sheet .foot .fl { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.1em; color: var(--faint); }

  /* ============================================================
     PRINT  → clean single A4, no chrome
     ============================================================ */
  @media print {
    @page { size: A4; margin: 0; }
    html, body { background: #fff; }
    .topbar, .formpane, .previewpane { all: unset; }
    .topbar, .formpane { display: none !important; }
    .app, .work { display: block; }
    .previewpane { display: block !important; padding: 0 !important; background: #fff !important; overflow: visible !important; }
    #stage { transform: none !important; margin: 0 !important; }
    #sheet { box-shadow: none !important; margin: 0 !important; width: 210mm; min-height: 297mm; }
    #sheet .item-row { break-inside: avoid; page-break-inside: avoid; }
    #sheet .totals, #sheet .paynotes, #sheet .foot {
      break-inside: avoid; page-break-inside: avoid;
    }
  }

  @media (max-width: 900px) {
    .work { flex-direction: column; }
    .formpane { width: 100%; flex: none; max-height: none; border-right: none; border-bottom: 1px solid var(--line); }
    .previewpane { padding: 20px 10px 40px; }
  }
</style>
</head>

            <input type="text" class="mono" id="f_number">
          </div>
          <div class="row">
            <div class="field"><label>Issue Date</label><input type="date" id="f_issue"></div>
            <div class="field"><label>Due Date</label><input type="date" id="f_due"></div>
          </div>
        </div>

        <!-- bill to -->
        <div class="sec">
          <h2>Bill To</h2>
          <div class="field"><label>Company</label><input type="text" id="f_company"></div>
          <div class="field"><label>Contact (optional)</label><input type="text" id="f_contact" placeholder="Attn: Contact Name"></div>
          <div class="field"><label>Address</label><textarea id="f_address" rows="3" placeholder="One line per row"></textarea>
            <div class="hint">Empty lines are omitted on the invoice.</div>
          </div>
          <button class="mini ghost" id="btnSaveClient">Save client</button>
        </div>

        <!-- line items -->
        <div class="sec">
          <h2>Line Items</h2>
          <div id="itemsForm"></div>
          <button class="mini" id="btnAddItem">+ Add item</button>
        </div>

        <!-- compliance -->
        <div class="sec plain">
          <h2>Compliance</h2>
          <div class="toggle">
            <input type="checkbox" id="f_gst">
            <label for="f_gst">Show “GST — Not applicable” row (supplier not registered for GST)</label>
          </div>
        </div>

        <!-- payment -->
        <div class="sec plain">
          <h2>Payment Details</h2>
          <div class="field"><label>Account Name</label><input type="text" class="mono" id="p_account"></div>
          <div class="row">
            <div class="field"><label>BSB</label><input type="text" class="mono" id="p_bsb"></div>
            <div class="field"><label>Account No.</label><input type="text" class="mono" id="p_accno"></div>
          </div>
          <div class="field"><label>Reference</label><input type="text" class="mono" id="p_ref">
            <div class="hint">Defaults to the invoice number until you change it.</div>
          </div>
        </div>

        <!-- notes -->
        <div class="sec plain">
          <h2>Notes</h2>
          <div class="field"><textarea id="f_notes" rows="4"></textarea></div>
        </div>

        <!-- saved invoices -->
        <details class="panel">
          <summary>Saved Invoices</summary>
          <div class="panel-body"><div id="savedInvoices" class="savedlist"></div></div>
        </details>

        <!-- saved clients -->
        <details class="panel">
          <summary>Saved Clients</summary>
          <div class="panel-body"><div id="savedClients" class="savedlist"></div></div>
        </details>

        <!-- settings -->
        <details class="panel">
          <summary>Supplier &amp; Settings</summary>
          <div class="panel-body">
            <div class="field"><label>Supplier legal name</label><input type="text" class="mono" id="s_name"></div>
            <div class="field"><label>ABN</label><input type="text" class="mono" id="s_abn"></div>
            <div class="row">
              <div class="field"><label>Contact email</label><input type="email" class="mono" id="s_email"></div>
              <div class="field"><label>Contact phone</label><input type="tel" class="mono" id="s_phone"></div>
            </div>
            <div class="field"><label>Next invoice counter (NNN)</label><input type="number" class="mono" id="s_counter" min="1"></div>
            <div class="hint">Used when you press “New”. Format: ALLFJ-YYYY-NNN.</div>
          </div>
        </details>

      </div>
    </div>

    <!-- ================= PREVIEW PANE ================= -->
    <div class="previewpane" id="previewpane">
      <div id="stage"><div id="sheet"></div></div>
    </div>
  </div>
</div>

const LS = { settings: "allfj_settings_v1", invoices: "allfj_invoices_v1", draft: "allfj_draft_v1" };
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

/* ---------- helpers ---------- */
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const num = (v) => { const n = parseFloat(v); return isFinite(n) ? n : 0; };
const fmt = (n) => num(n).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtAUD = (n) => "A$" + fmt(n);
const fmtQty = (q) => { const n = num(q); return Number.isInteger(n) ? String(n) : n.toLocaleString("en-AU",{maximumFractionDigits:2}); };
function fmtDate(iso) {
  if (!iso) return "—";
  const p = iso.split("-"); if (p.length !== 3) return iso;
  return `${p[2]} ${MONTHS[(+p[1]||1)-1]} ${p[0]}`;
}
function todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function addDaysISO(iso, days) { const d = new Date(iso + "T00:00:00"); d.setDate(d.getDate()+days); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function invoiceNumber(year, counter) { return `ALLFJ-${year}-${String(counter).padStart(3,"0")}`; }

/* ---------- state ---------- */
let settings, invoice;

function defaultSettings() {
  return {
    supplierName: "Myungwoon Kim",
    abn: "33 288 727 189",
    email: "hello@allfjai.com",
    phone: "+61 000 000 000",
    counter: 1,
    savedClients: []
  };
}
function seedInvoice() {
  // Seeds the exact handoff reference so first load = the design 1:1.
  return {
    number: "ALLFJ-2026-001",
    issueDate: "2026-07-09",
    dueDate: "2026-07-23",
    client: {
      company: "Client Company Pty Ltd",
      contact: "Attn: Contact Name",
      address: "Level 00, 000 Street Name\nSydney NSW 2000, Australia"
    },
    items: [
      { title: "AI Consulting — Discovery & Roadmap", subtitle: "Workflow audit, automation opportunity mapping, implementation plan", qty: 1, rate: 2400 },
      { title: "Workflow Automation Build", subtitle: "CRM automation and internal tooling integration", qty: 1, rate: 3800 }
    ],
    payment: { accountName: "ALLFJ AI", bsb: "000-000", accountNo: "0000 0000", reference: "ALLFJ-2026-001", refTouched: false },
    notes: "Supplier is not registered for GST. No GST has been charged on this invoice. Payment is due within 14 days of the issue date. Please quote the invoice number as the payment reference.",
    showGstRow: true
  };
}
function blankInvoice() {
  const year = new Date().getFullYear();
  const number = invoiceNumber(year, settings.counter);
  const issue = todayISO();
  return {
    number,
    issueDate: issue,
    dueDate: addDaysISO(issue, 14),
    client: { company: "", contact: "", address: "" },
    items: [{ title: "", subtitle: "", qty: 1, rate: 0 }],
    payment: { accountName: "ALLFJ AI", bsb: settings._lastBsb || "000-000", accountNo: settings._lastAccNo || "0000 0000", reference: number, refTouched: false },
    notes: "Supplier is not registered for GST. No GST has been charged on this invoice. Payment is due within 14 days of the issue date. Please quote the invoice number as the payment reference.",
    showGstRow: true
  };
}

/* ---------- persistence ---------- */
function loadSettings() {
  try { const s = JSON.parse(localStorage.getItem(LS.settings)); settings = Object.assign(defaultSettings(), s || {}); }
  catch { settings = defaultSettings(); }
}
function saveSettings() { localStorage.setItem(LS.settings, JSON.stringify(settings)); }
function loadInvoices() { try { return JSON.parse(localStorage.getItem(LS.invoices)) || []; } catch { return []; } }
function saveInvoicesList(list) { localStorage.setItem(LS.invoices, JSON.stringify(list)); }
function saveDraft() { localStorage.setItem(LS.draft, JSON.stringify(invoice)); }
function loadDraft() { try { return JSON.parse(localStorage.getItem(LS.draft)); } catch { return null; } }

/* ---------- computed ---------- */
const subtotal = () => invoice.items.reduce((s, it) => s + num(it.qty) * num(it.rate), 0);

/* ================================================================
   RENDER: the invoice sheet (exact design)
   ================================================================ */
function renderSheet() {
  const inv = invoice;
  const addrLines = (inv.client.address || "").split("\n").map(s => s.trim()).filter(Boolean);
  const contact = (inv.client.contact || "").trim();

  const itemsHTML = inv.items.map(it => {
    const amount = num(it.qty) * num(it.rate);
    const sub = (it.subtitle || "").trim();
    return `
      <div class="item-row">
        <div class="desc">
          <div class="t">${esc(it.title) || "&nbsp;"}</div>
          ${sub ? `<div class="s">${esc(sub)}</div>` : ""}
        </div>
        <div class="fig">${fmtQty(it.qty)}</div>
        <div class="fig">${fmt(it.rate)}</div>
        <div class="fig">${fmt(amount)}</div>
      </div>`;
  }).join("");

  const gstRow = inv.showGstRow
    ? `<div class="trow"><div class="k">GST</div><div class="v muted">Not applicable</div></div>` : "";

  const clientLines = [
    contact ? `<div class="ln">${esc(contact)}</div>` : "",
    ...addrLines.map(l => `<div class="ln">${esc(l)}</div>`)
  ].join("");

  $("sheet").innerHTML = `
    <div class="hdr">
      <div class="id">
        <img src="${MARK}" alt="ALLFJ AI mark">
        <div class="wm">
          <div class="name">ALLFJ</div>
          <div class="tag">AI SYSTEMS STUDIO</div>
        </div>
      </div>
      <div class="meta-wrap">
        <div class="doc-title">Invoice</div>
        <div class="meta">
          <div class="k">INVOICE NO.</div><div class="v">${esc(inv.number)}</div>
          <div class="k">ISSUE DATE</div><div class="v">${fmtDate(inv.issueDate)}</div>
          <div class="k">DUE DATE</div><div class="v">${fmtDate(inv.dueDate)}</div>
        </div>
      </div>
    </div>

    <div class="rule-strong"></div>

    <div class="parties">
      <div class="col">
        <div class="plabel to">BILL TO</div>
        <div class="lines">
          <div class="co">${esc(inv.client.company) || "&nbsp;"}</div>
          ${clientLines}
        </div>
      </div>
      <div class="col">
        <div class="plabel from">FROM</div>
        <div class="lines">
          <div class="co">ALLFJ AI</div>
          <div class="ln">${esc(settings.supplierName)} · Sole Trader</div>
          <div class="ln">ABN ${esc(settings.abn)}</div>
          <div class="ln">AI Consulting &amp; Automation Systems</div>
          <div class="ln">Sydney, Australia</div>
          <div class="ln"><a href="https://allfjai.com" style="color:var(--body)">allfjai.com</a></div>
        </div>
      </div>
    </div>

    <div class="items-head">
      <div class="h">DESCRIPTION</div>
      <div class="h r">QTY</div>
      <div class="h r">RATE</div>
      <div class="h r">AMOUNT</div>
    </div>
    ${itemsHTML}

    <div class="totals">
      <div class="box">
        <div class="trow"><div class="k">SUBTOTAL</div><div class="v">${fmtAUD(subtotal())}</div></div>
        ${gstRow}
        <div class="grand">
          <div class="k">TOTAL DUE · AUD</div>
          <div class="v">${fmtAUD(subtotal())}</div>
        </div>
      </div>
    </div>

    <div class="paynotes">
      <div class="col">
        <div class="blabel">PAYMENT DETAILS</div>
        <div class="pgrid">
          <div class="pk">Account Name</div><div class="pv">${esc(inv.payment.accountName)}</div>
          <div class="pk">BSB</div><div class="pv">${esc(inv.payment.bsb)}</div>
          <div class="pk">Account No.</div><div class="pv">${esc(inv.payment.accountNo)}</div>
          <div class="pk">Reference</div><div class="pv">${esc(inv.payment.reference)}</div>
        </div>
      </div>
      <div class="col">
        <div class="blabel">NOTES</div>
        <div class="notes">${esc(inv.notes).replace(/\n/g, "<br>")}</div>
      </div>
    </div>

    <div class="foot">
      <div class="inner">
        <div class="fl">SUPPLIER: ${esc(settings.supplierName).toUpperCase()}&nbsp;&nbsp;·&nbsp;&nbsp;ABN ${esc(settings.abn)}&nbsp;&nbsp;·&nbsp;&nbsp;SYDNEY, AUSTRALIA</div>
        <div class="fl">ALLFJAI.COM&nbsp;&nbsp;·&nbsp;&nbsp;${esc(settings.email).toUpperCase()}&nbsp;&nbsp;·&nbsp;&nbsp;${esc(settings.phone)}</div>
      </div>
    </div>
  `;
  updateScale();
}

/* fit the A4 sheet to the preview pane width */
function updateScale() {
  const pane = $("previewpane"), stage = $("stage"), sheet = $("sheet");
  if (!pane) return;
  const avail = pane.clientWidth - 60;              // minus padding breathing room
  const sw = sheet.offsetWidth || 794;
  const scale = Math.min(1, avail / sw);
  sheet.style.transform = `scale(${scale})`;
  stage.style.width = (sw * scale) + "px";
  stage.style.height = (sheet.offsetHeight * scale) + "px";
}

/* ================================================================
   RENDER: line-item form cards
   ================================================================ */
function renderItemsForm() {
  const wrap = $("itemsForm");
  wrap.innerHTML = invoice.items.map((it, i) => {
    const amount = num(it.qty) * num(it.rate);
    return `
      <div class="item" data-idx="${i}">
        <div class="item-head">
          <span class="num">Item ${i + 1}</span>
          <span class="item-btns">
            <button class="mini ghost" data-act="up" ${i === 0 ? "disabled" : ""}>↑</button>
            <button class="mini ghost" data-act="down" ${i === invoice.items.length - 1 ? "disabled" : ""}>↓</button>
            <button class="mini ghost" data-act="del">✕</button>
          </span>
        </div>
        <div class="field"><input type="text" data-f="title" placeholder="Description" value="${esc(it.title)}"></div>
        <div class="field"><textarea data-f="subtitle" rows="5" placeholder="Detailed description (optional) — use a new line for each bullet">${esc(it.subtitle)}</textarea></div>
        <div class="qr">
          <div class="field" style="width:64px"><label>Qty</label><input type="number" class="mono" data-f="qty" step="any" value="${esc(it.qty)}"></div>
          <div class="field" style="width:110px"><label>Rate (A$)</label><input type="number" class="mono" data-f="rate" step="any" value="${esc(it.rate)}"></div>
          <div class="amt"><span class="lbl">Amount</span><span class="val">${fmt(amount)}</span></div>
        </div>
      </div>`;
  }).join("");
}

/* ================================================================
   RENDER: saved invoices & clients lists
   ================================================================ */
function renderSaved() {
  const invEl = $("savedInvoices");
  const list = loadInvoices();
  invEl.innerHTML = list.length ? list.map(r => `
    <div class="srow" data-num="${esc(r.number)}">
      <div class="meta"><b>${esc(r.client.company) || "Untitled"}</b><span>${esc(r.number)} · ${fmtAUD(r.items.reduce((s,it)=>s+num(it.qty)*num(it.rate),0))}</span></div>
      <div class="sbtns">
        <button class="mini ghost" data-sact="load">Load</button>
        <button class="mini ghost" data-sact="del">✕</button>
      </div>
    </div>`).join("") : `<div class="empty-note">No saved invoices yet. Press “Save”.</div>`;

  const cEl = $("savedClients");
  cEl.innerHTML = settings.savedClients.length ? settings.savedClients.map((c, i) => `
    <div class="srow" data-cidx="${i}">
      <div class="meta"><b>${esc(c.company) || "Client"}</b><span>${esc((c.address||"").split("\n")[0] || "")}</span></div>
      <div class="sbtns">
        <button class="mini ghost" data-cact="load">Use</button>
        <button class="mini ghost" data-cact="del">✕</button>
      </div>
    </div>`).join("") : `<div class="empty-note">No saved clients yet. Fill “Bill To”, then “Save client”.</div>`;
}

/* ================================================================
   SYNC form <-> state
   ================================================================ */
function fillForm() {
  $("f_number").value = invoice.number;
  $("f_issue").value = invoice.issueDate;
  $("f_due").value = invoice.dueDate;
  $("f_company").value = invoice.client.company;
  $("f_contact").value = invoice.client.contact;
  $("f_address").value = invoice.client.address;
  $("f_gst").checked = invoice.showGstRow;
  $("p_account").value = invoice.payment.accountName;
  $("p_bsb").value = invoice.payment.bsb;
  $("p_accno").value = invoice.payment.accountNo;
  $("p_ref").value = invoice.payment.reference;
  $("f_notes").value = invoice.notes;
  // settings
  $("s_name").value = settings.supplierName;
  $("s_abn").value = settings.abn;
  $("s_email").value = settings.email;
  $("s_phone").value = settings.phone;
  $("s_counter").value = settings.counter;
  renderItemsForm();
}

function refresh() { renderSheet(); saveDraft(); }

/* ================================================================
   WIRE UP EVENTS
   ================================================================ */
function bind() {
  // scalar invoice fields
  $("f_number").addEventListener("input", e => {
    const old = invoice.number;
    invoice.number = e.target.value;
    // keep payment reference in sync until user overrides it
    if (!invoice.payment.refTouched || invoice.payment.reference === old) {
      invoice.payment.reference = e.target.value;
      $("p_ref").value = e.target.value;
    }
    refresh();
  });
  $("f_issue").addEventListener("input", e => { invoice.issueDate = e.target.value; refresh(); });
  $("f_due").addEventListener("input", e => { invoice.dueDate = e.target.value; refresh(); });
  $("f_company").addEventListener("input", e => { invoice.client.company = e.target.value; refresh(); });
  $("f_contact").addEventListener("input", e => { invoice.client.contact = e.target.value; refresh(); });
  $("f_address").addEventListener("input", e => { invoice.client.address = e.target.value; refresh(); });
  $("f_gst").addEventListener("change", e => { invoice.showGstRow = e.target.checked; refresh(); });
  $("f_notes").addEventListener("input", e => { invoice.notes = e.target.value; refresh(); });

  // payment
  $("p_account").addEventListener("input", e => { invoice.payment.accountName = e.target.value; refresh(); });
  $("p_bsb").addEventListener("input", e => { invoice.payment.bsb = e.target.value; settings._lastBsb = e.target.value; refresh(); });
  $("p_accno").addEventListener("input", e => { invoice.payment.accountNo = e.target.value; settings._lastAccNo = e.target.value; refresh(); });
  $("p_ref").addEventListener("input", e => { invoice.payment.reference = e.target.value; invoice.payment.refTouched = true; refresh(); });

  // settings (persist immediately)
  const sBind = (id, key, isNum) => $(id).addEventListener("input", e => {
    settings[key] = isNum ? (parseInt(e.target.value,10) || 1) : e.target.value;
    saveSettings(); refresh();
  });
  sBind("s_name","supplierName"); sBind("s_abn","abn");
  sBind("s_email","email"); sBind("s_phone","phone");
  sBind("s_counter","counter", true);

  // line items — delegated input (no re-render = no focus loss)
  $("itemsForm").addEventListener("input", e => {
    const card = e.target.closest(".item"); if (!card) return;
    const i = +card.dataset.idx, f = e.target.dataset.f; if (!f) return;
    invoice.items[i][f] = (f === "qty" || f === "rate") ? e.target.value : e.target.value;
    // live-update just the amount label in this card + the sheet
    if (f === "qty" || f === "rate") {
      const amt = card.querySelector(".amt .val");
      if (amt) amt.textContent = fmt(num(invoice.items[i].qty) * num(invoice.items[i].rate));
    }
    refresh();
  });
  // line items — structural buttons (re-render cards)
  $("itemsForm").addEventListener("click", e => {
    const btn = e.target.closest("button"); if (!btn) return;
    const card = e.target.closest(".item"); const i = +card.dataset.idx;
    const act = btn.dataset.act;
    if (act === "del") { if (invoice.items.length > 1) invoice.items.splice(i,1); }
    else if (act === "up" && i > 0) { [invoice.items[i-1], invoice.items[i]] = [invoice.items[i], invoice.items[i-1]]; }
    else if (act === "down" && i < invoice.items.length-1) { [invoice.items[i+1], invoice.items[i]] = [invoice.items[i], invoice.items[i+1]]; }
    renderItemsForm(); refresh();
  });
  $("btnAddItem").addEventListener("click", () => {
    invoice.items.push({ title:"", subtitle:"", qty:1, rate:0 });
    renderItemsForm(); refresh();
  });

  // toolbar
  $("btnNew").addEventListener("click", () => {
    if (!confirm("Start a new invoice? Unsaved changes to the current draft will be replaced.")) return;
    invoice = blankInvoice();
    fillForm(); refresh();
  });
  $("btnSave").addEventListener("click", () => {
    const list = loadInvoices();
    const idx = list.findIndex(r => r.number === invoice.number);
    const record = JSON.parse(JSON.stringify(invoice));
    if (idx >= 0) list[idx] = record; else list.unshift(record);
    saveInvoicesList(list);
    // bump the counter if this is the newest ALLFJ-YYYY-NNN for the year
    const m = invoice.number.match(/^ALLFJ-(\d{4})-(\d+)$/);
    if (m && +m[2] >= settings.counter) { settings.counter = +m[2] + 1; }
    saveSettings(); renderSaved();
    flash($("btnSave"), "Saved");
  });
  $("btnPrint").addEventListener("click", () => window.print());

  // save client
  $("btnSaveClient").addEventListener("click", () => {
    const c = { company: invoice.client.company, contact: invoice.client.contact, address: invoice.client.address };
    if (!c.company.trim()) { alert("Add a company name first."); return; }
    const i = settings.savedClients.findIndex(x => x.company === c.company);
    if (i >= 0) settings.savedClients[i] = c; else settings.savedClients.push(c);
    saveSettings(); renderSaved();
    flash($("btnSaveClient"), "Saved");
  });

  // saved invoices list
  $("savedInvoices").addEventListener("click", e => {
    const btn = e.target.closest("button"); if (!btn) return;
    const row = e.target.closest(".srow"); const number = row.dataset.num;
    const list = loadInvoices();
    if (btn.dataset.sact === "load") {
      const rec = list.find(r => r.number === number);
      if (rec) { invoice = JSON.parse(JSON.stringify(rec)); fillForm(); refresh(); }
    } else if (btn.dataset.sact === "del") {
      if (confirm(`Delete invoice ${number}?`)) { saveInvoicesList(list.filter(r => r.number !== number)); renderSaved(); }
    }
  });
  // saved clients list
  $("savedClients").addEventListener("click", e => {
    const btn = e.target.closest("button"); if (!btn) return;
    const row = e.target.closest(".srow"); const i = +row.dataset.cidx;
    if (btn.dataset.cact === "load") {
      const c = settings.savedClients[i];
      invoice.client = { company: c.company, contact: c.contact, address: c.address };
      $("f_company").value = c.company; $("f_contact").value = c.contact; $("f_address").value = c.address;
      refresh();
    } else if (btn.dataset.cact === "del") {
      settings.savedClients.splice(i,1); saveSettings(); renderSaved();
    }
  });

  window.addEventListener("resize", updateScale);
}

function flash(btn, txt) {
  const orig = btn.textContent; btn.textContent = txt;
  setTimeout(() => { btn.textContent = orig; }, 1100);
}

/* ================================================================
   BOOT
   ================================================================ */
function init() {
  loadSettings();
  const draft = loadDraft();
  invoice = draft || seedInvoice();
  // migrate any missing payment flag
  if (invoice.payment && invoice.payment.refTouched === undefined) invoice.payment.refTouched = false;
  fillForm();
  renderSaved();
  bind();
  renderSheet();
  // fonts may load after first paint — rescale once ready
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(updateScale);
  setTimeout(updateScale, 400);
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
